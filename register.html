<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Create Account</h1>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

            <input
                type="text"
                id="rollNo"
                placeholder="Matric Number"
                required
            >

            <input
                type="text"
                id="department"
                placeholder="Department"
                required
            >

            <input
                type="text"
                id="faculty"
                placeholder="Faculty"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

<script src="register.js"></script>

</body>
  </html>
